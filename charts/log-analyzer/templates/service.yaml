apiVersion: v1
kind: Service
metadata:
  name: {{ include "log-analyzer.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "log-analyzer.name" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      nodePort: {{ .Values.service.nodePort }}
